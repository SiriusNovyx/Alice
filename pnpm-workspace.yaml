packages:
  - 'backend'
  - 'shared'
  - 'dashboard'

allowBuilds:
  bufferutil: true
  utf-8-validate: true

minimumReleaseAge: 20160 # in minutes (2 weeks)
minimumReleaseAgeExclude:
  - 'vety'
  - 'knub-command-manager'
  - '@fastify/static'
  - 'fast-uri'
  - 'fastify'
  - 'flatted'
  - 'glob'
  - 'lodash'
  - 'lodash-es'
  - 'minimatch'
  - 'multer'
  - 'path-to-regexp'
  - 'picomatch'
  - 'tmp'
  - 'typeorm'
  - 'undici'
  - 'ws'
  - 'qs'

overrides:
  # Keep in sync with Vety's discord.js version
  discord.js: "14.23.2"
  discord-api-types: "0.38.30"
  fastify@<5.7.2: "5.8.5"
  fast-uri@<=3.1.0: "3.1.2"
  flatted@<=3.4.1: "3.4.2"
  glob@>=10.2.0 <10.5.0: "10.5.0"
  lodash@>=4.0.0 <=4.17.23: "4.18.1"
  lodash-es@>=4.0.0 <=4.17.23: "4.18.0"
  minimatch@<3.1.4: "3.1.5"
  minimatch@>=9.0.0 <9.0.7: "9.0.7"
  multer@<2.2.0: "2.2.0"
  path-to-regexp@<0.1.13: "0.1.13"
  picomatch@<2.3.2: "2.3.2"
  picomatch@>=4.0.0 <4.0.4: "4.0.4"
  undici@>=6.0.0 <6.27.0: "6.27.0"
  brace-expansion@>=5.0.0 <5.0.6: "5.0.6"
  brace-expansion@>=1.0.0 <1.1.13: "1.1.13"
  qs: "6.15.2"
  uuid@<11.1.1: "11.1.1"
  postcss@<8.5.10: "8.5.10"
  ajv@>=7.0.0-alpha.0 <8.18.0: "8.18.0"
  ajv@>=6.0.0 <6.14.0: "6.14.0"
  js-yaml: "4.2.0"
  js-yaml@<4.2.0: "4.2.0"
  ws@>=8.0.0 <8.21.0: "8.21.0"
  diff@>=4.0.0 <4.0.4: "4.0.4"
